#c { display:block; width:100vw; height:100vh; }

/* ── HERO SELECT ── */
#heroSelect {

.heroRole { font-size:.7rem; color:#aaa; margin-bottom:7px; }
.heroStats { font-size:.68rem; color:#ccc; text-align:left; }

<script>

// ══════════════════════════════════════════════
// TIMEGUARD
// ══════════════════════════════════════════════
const TimeGuard = {
  LIMIT: 1800,
  KEY_NICK:'hn_nickname', KEY_TIME:'hn_playtime', KEY_DATE:'hn_date',
  _start:0, _tickInterval:null,
  _today(){ return new Date().toISOString().slice(0,10); },
  getPlayed(){
    if(localStorage.getItem(this.KEY_DATE)!==this._today()){
      localStorage.setItem(this.KEY_DATE,this._today());
      localStorage.setItem(this.KEY_TIME,'0');
    }
    return parseInt(localStorage.getItem(this.KEY_TIME)||'0');
  },
  getRemaining(){ return Math.max(0,this.LIMIT-this.getPlayed()); },
  isOver(){ return this.getPlayed()>=this.LIMIT; },
  startSession(){
    this._start=Date.now();
    this._tickInterval=setInterval(()=>{
      const elapsed=Math.floor((Date.now()-this._start)/1000);
      const total=parseInt(localStorage.getItem(this.KEY_TIME)||'0')+elapsed;
      localStorage.setItem(this.KEY_TIME,String(total));
      this._start=Date.now();
      if(this.isOver()) this._triggerTimeUp();
    },10000);
  },
  stopSession(){
    if(this._tickInterval){clearInterval(this._tickInterval);this._tickInterval=null;}
    const elapsed=Math.floor((Date.now()-this._start)/1000);
    const total=parseInt(localStorage.getItem(this.KEY_TIME)||'0')+elapsed;
    localStorage.setItem(this.KEY_TIME,String(Math.min(total,this.LIMIT)));
  },
  _triggerTimeUp(){
    this.stopSession();
    document.getElementById('timeUpOverlay').style.display='flex';
    window.gameRunning=false;
  },
  initUI(){
    const saved=localStorage.getItem(this.KEY_NICK)||'';
    if(saved) document.getElementById('nicknameInput').value=saved;
    const rem=this.getRemaining();
    const m=Math.floor(rem/60),s=rem%60;
    document.getElementById('timeDisplay').textContent=`오늘 남은 시간: ${m}분 ${s}초`;
    if(this.isOver()) this._triggerTimeUp();
  }
};

  try{

    camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,300);

    scene.add(new THREE.HemisphereLight(0xaaccff,0x556655,1.0));
    const fill=new THREE.DirectionalLight(0xffffff,0.8);
    fill.position.set(-20,10,-20); scene.add(fill);

    buildMap();

    initPlayer();

function makeGridTex(sz,bg,line,rep){
  const cv=document.createElement('canvas'); cv.width=cv.height=sz;
  const cx=cv.getContext('2d');
  cx.fillStyle='#'+bg.toString(16).padStart(6,'0'); cx.fillRect(0,0,sz,sz);
  cx.strokeStyle='#'+line.toString(16).padStart(6,'0'); cx.lineWidth=1;
  const step=sz/4;
  for(let i=0;i<=4;i++){
    cx.beginPath();cx.moveTo(i*step,0);cx.lineTo(i*step,sz);cx.stroke();
    cx.beginPath();cx.moveTo(0,i*step);cx.lineTo(sz,i*step);cx.stroke();
  }
  const t=new THREE.CanvasTexture(cv);
  t.wrapS=t.wrapT=THREE.RepeatWrapping; t.repeat.set(rep,rep);
  return t;
}

function buildBox(w,h,d,color,x,y,z,solid=true,cast=true){
  const m=new THREE.Mesh(
    new THREE.BoxGeometry(w,h,d),
    new THREE.MeshLambertMaterial({color})
  );
  m.position.set(x,y,z);
  m.castShadow=cast; m.receiveShadow=true;
  if(solid) m.userData.solid=true;
  scene.add(m); return m;
}

  buildings.forEach(([w,h,d,c,x,y,z])=>{

    p.position.set(x,2.25,z); p.castShadow=true; p.userData.solid=true; scene.add(p);

  [[16,16],[-16,16],[16,-16],[-16,-16],[22,0],[-22,0],[0,22],[0,-22]].forEach(([x,z])=>{

function createEnemy(typeIdx){
  const type=ENEMY_TYPES[typeIdx];
  const design=ENEMY_DESIGN[typeIdx];
  const g=new THREE.Group();
  const bodyGrp=new THREE.Group(); g.add(bodyGrp);

  const col=new THREE.Color(type.color);
  const armorMat=new THREE.MeshPhongMaterial({color:design.armorTint,shininess:60,specular:0x333333});
  const armorDkMat=new THREE.MeshPhongMaterial({color:new THREE.Color(design.armorTint).multiplyScalar(0.5),shininess:40});
  const skinMat=new THREE.MeshPhongMaterial({color:design.skinColor,shininess:20});
  const accentMat=new THREE.MeshPhongMaterial({color:design.accentColor,shininess:80,specular:0x555555});
  const glowMat=new THREE.MeshBasicMaterial({color:design.glowColor});
  const blackMat=new THREE.MeshPhongMaterial({color:0x111111,shininess:90,specular:0x666666});
  const metalMat=new THREE.MeshPhongMaterial({color:0x888899,shininess:100,specular:0xaaaaaa,metalness:0.8});

  const sx=design.bodyScale[0], sy=design.bodyScale[1], sz=design.bodyScale[2];

  // ── LEGS (booted) ──
  const bootMat=new THREE.MeshPhongMaterial({color:0x222222,shininess:30});
  const legMat=new THREE.MeshPhongMaterial({color:0x333340,shininess:20});
  const lL=new THREE.Group();
  const lThigh=new THREE.Mesh(new THREE.CylinderGeometry(0.09*sx,0.1*sx,0.38,8),legMat);
  lThigh.position.y=0.19; lL.add(lThigh);
  const lShin=new THREE.Mesh(new THREE.CylinderGeometry(0.08*sx,0.09*sx,0.32,8),legMat);
  lShin.position.y=-0.16; lL.add(lShin);
  const lBoot=new THREE.Mesh(new THREE.BoxGeometry(0.14*sx,0.12,0.22*sz),bootMat);
  lBoot.position.set(0,-0.36,-0.02); lL.add(lBoot);
  if(design.hasKneePads){
    const kp=new THREE.Mesh(new THREE.SphereGeometry(0.055*sx,6,4),armorMat);
    kp.scale.z=0.5; kp.position.set(0,0,-0.1*sz); lL.add(kp);
  }
  lL.position.set(-0.16*sx,0.52,0); bodyGrp.add(lL);

  const rL=lL.clone(true);
  rL.position.set(0.16*sx,0.52,0); bodyGrp.add(rL);

  // ── TORSO (layered armor) ──
  // Inner body
  const innerBody=new THREE.Mesh(new THREE.BoxGeometry(0.52*sx,0.7*sy,0.3*sz),armorDkMat);
  innerBody.position.y=1.1; innerBody.castShadow=true; bodyGrp.add(innerBody);
  // Chest plate
  const chestPlate=new THREE.Mesh(new THREE.BoxGeometry(0.56*sx,0.5*sy,0.14*sz),armorMat);
  chestPlate.position.set(0,1.15,-0.15*sz); chestPlate.castShadow=true; bodyGrp.add(chestPlate);
  // Back plate
  const backPlate=new THREE.Mesh(new THREE.BoxGeometry(0.48*sx,0.45*sy,0.08*sz),armorDkMat);
  backPlate.position.set(0,1.12,0.17*sz); bodyGrp.add(backPlate);
  // Waist/belt
  if(design.hasBelt){
    const belt=new THREE.Mesh(new THREE.BoxGeometry(0.58*sx,0.08,0.34*sz),blackMat);
    belt.position.y=0.78; bodyGrp.add(belt);
    const buckle=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.06,0.04),accentMat);
    buckle.position.set(0,0.78,-0.18*sz); bodyGrp.add(buckle);
  }
  // Collar/neck guard
  const collar=new THREE.Mesh(new THREE.CylinderGeometry(0.14*sx,0.18*sx,0.1,8),armorMat);
  collar.position.y=1.48; bodyGrp.add(collar);

  // ── SHOULDER ARMOR ──
  if(design.shoulders){
    [-1,1].forEach(side=>{
      const shG=new THREE.Group();
      const sh=new THREE.Mesh(new THREE.SphereGeometry(0.14*sx,8,6),armorMat);
      sh.scale.set(1.2,0.7,1); shG.add(sh);
      const shPlate=new THREE.Mesh(new THREE.BoxGeometry(0.18*sx,0.06,0.16*sz),accentMat);
      shPlate.position.y=0.06; shG.add(shPlate);
      shG.position.set(side*0.38*sx,1.32,0); bodyGrp.add(shG);

  // ── ARMS (upper arm + forearm + hand) ──
  const lA=new THREE.Group();
  const lUpper=new THREE.Mesh(new THREE.CylinderGeometry(0.07*sx,0.08*sx,0.32,8),armorDkMat);
  lUpper.position.y=-0.16; lA.add(lUpper);

  lElbow.position.y=-0.32; lA.add(lElbow);
  const lForearm=new THREE.Mesh(new THREE.CylinderGeometry(0.06*sx,0.07*sx,0.28,8),armorMat);
  lForearm.position.y=-0.48; lA.add(lForearm);
  const lHand=new THREE.Mesh(new THREE.SphereGeometry(0.05*sx,5,4),skinMat);
  lHand.position.y=-0.64; lA.add(lHand);
  // Forearm guard
  const lGuard=new THREE.Mesh(new THREE.BoxGeometry(0.09*sx,0.14,0.06*sz),accentMat);
  lGuard.position.set(0,-0.45,-0.06*sz); lA.add(lGuard);
  lA.position.set(-0.34*sx,1.35,0); bodyGrp.add(lA);

  const rA=new THREE.Group();
  const rUpper=new THREE.Mesh(new THREE.CylinderGeometry(0.07*sx,0.08*sx,0.32,8),armorDkMat);
  rUpper.position.y=-0.16; rA.add(rUpper);

  rElbow.position.y=-0.32; rA.add(rElbow);
  const rForearm=new THREE.Mesh(new THREE.CylinderGeometry(0.06*sx,0.07*sx,0.28,8),armorMat);

  const rHand=new THREE.Mesh(new THREE.SphereGeometry(0.05*sx,5,4),skinMat);
  rHand.position.y=-0.64; rA.add(rHand);
  const rGuard=new THREE.Mesh(new THREE.BoxGeometry(0.09*sx,0.14,0.06*sz),accentMat);
  rGuard.position.set(0,-0.45,-0.06*sz); rA.add(rGuard);
  rA.position.set(0.34*sx,1.35,0); bodyGrp.add(rA);

  // ── WEAPON (held in right hand) ──
  function addWpnPart(geo,mat,x,y,z){ const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); wpnGrp.add(m); return m; }
  const wpnGrp=new THREE.Group();
  if(design.weaponType==='smg'){
    addWpnPart(new THREE.BoxGeometry(0.04,0.05,0.28),blackMat,0,0,-0.14);

    addWpnPart(new THREE.BoxGeometry(0.03,0.1,0.04),blackMat,0,-0.07,-0.1);
    wpnGrp.rotation.x=-Math.PI/2;
  } else if(design.weaponType==='minigun'){
    const barrelG=new THREE.Group();
    for(let i=0;i<4;i++){
      const b=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.4,6),metalMat);
      b.position.set(Math.cos(i*Math.PI/2)*0.035,0,Math.sin(i*Math.PI/2)*0.035);

// ── 피격 시 백색 플래시 + 넉백 ──
const hitFlashMat=new THREE.MeshBasicMaterial({color:0xffffff});

function enemyHitReaction(e, bulletDir){
  const ud=e.userData;
  // 1) 전신 백색 플래시
  ud.hitFlashTimer=0.08;
  ud.allMeshes.forEach(entry=>{ entry.mesh.material=hitFlashMat; });
  // 2) 머리 반동(flinch)
  ud.flinchTimer=0.18;
  if(bulletDir) ud.flinchDir.copy(bulletDir).normalize();
  else ud.flinchDir.set(0,0,1);
  // 3) 넉백
  const kb=ud.flinchDir.clone().multiplyScalar(0.3);
  e.position.add(kb);
  // 4) 혈흔 파티클
  spawnBloodFX(e.position.clone().setY(1.2), ud.flinchDir);
}

function spawnBloodFX(pos, dir){
  const colors=[0xff2200,0xcc0000,0xff4400,0xaa0000];
  for(let i=0;i<8;i++){
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(0.03+Math.random()*0.04,4,3),
      new THREE.MeshBasicMaterial({color:colors[i%4],transparent:true})
    );
    m.position.copy(pos);
    scene.add(m);
    const vel=dir.clone().multiplyScalar(2+Math.random()*4)
      .add(new THREE.Vector3((Math.random()-0.5)*3,Math.random()*4,(Math.random()-0.5)*3));
    particles.push({m,vel,life:0.4+Math.random()*0.3,maxLife:0.6,grav:12});
  }
}

// ── 피격 플래시/flinch 업데이트 (updateEnemies 에서 호출) ──
function updateHitEffects(e, dt){
  const ud=e.userData;
  if(ud.hitFlashTimer>0){
    ud.hitFlashTimer-=dt;
    if(ud.hitFlashTimer<=0){
      ud.allMeshes.forEach(entry=>{ entry.mesh.material=entry.origMat; });
    }
  }
  if(ud.flinchTimer>0){
    ud.flinchTimer-=dt;
    const flinchAmount=Math.sin(ud.flinchTimer*35)*0.15*(ud.flinchTimer/0.18);
    if(ud.headGrp){
      ud.headGrp.rotation.x=flinchAmount;
      ud.headGrp.rotation.z=flinchAmount*0.5;
    }
    // 몸체 흔들림
    if(ud.bodyGrp) ud.bodyGrp.rotation.z=flinchAmount*0.3;
    if(ud.flinchTimer<=0){
      if(ud.headGrp){ud.headGrp.rotation.x=0;ud.headGrp.rotation.z=0;}
      if(ud.bodyGrp) ud.bodyGrp.rotation.z=0;
    }
  }
}

function drawHPBar(enemy){
  const ud=enemy.userData;
  const ctx=ud.hpCtx; const cv=ud.hpCanvas;
  ctx.clearRect(0,0,200,40);
  // Background
  ctx.fillStyle='rgba(0,0,0,0.85)';
  ctx.fillRect(0,0,200,40);
  // Border
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1;
  ctx.strokeRect(1,1,198,38);
  // Name + type icon
  ctx.fillStyle='#fff'; ctx.font='bold 11px Arial';
  const icon=ud.healer?'✚':ud.type===3?'◎':ud.type===2?'▣':'◆';
  ctx.fillText(`${icon} ${ud.typeName}`,6,15);
  // HP number
  ctx.font='9px Arial'; ctx.fillStyle='#aaa';
  ctx.fillText(`${Math.ceil(ud.hp)}/${ud.maxHp}`,150,15);
  // HP bar background
  ctx.fillStyle='#330000'; ctx.fillRect(6,22,188,12);
  // HP bar fill
  const pct=Math.max(0,ud.hp/ud.maxHp);
  const grad=ctx.createLinearGradient(6,0,194,0);
  if(pct>0.5){ grad.addColorStop(0,'#00cc44'); grad.addColorStop(1,'#44ff66'); }
  else if(pct>0.25){ grad.addColorStop(0,'#cc8800'); grad.addColorStop(1,'#ffaa00'); }
  else { grad.addColorStop(0,'#cc0000'); grad.addColorStop(1,'#ff3300'); }
  ctx.fillStyle=grad;
  ctx.fillRect(6,22,Math.floor(188*pct),12);
  // HP bar shine
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(6,22,Math.floor(188*pct),5);
  ud.hpTex.needsUpdate=true;
}

const WAVE_CFG=[[0],[0,1],[0,1,2],[1,2,3],[1,2,3,4],[0,1,2,3,4]];
const WAVE_CNT=[5,6,7,8,9,12];

function spawnWave(w){
  waveNum=w; waveActive=true;
  enemies.forEach(e=>{if(e.userData.alive!==false)scene.remove(e);});
  enemies=[];
  const count=WAVE_CNT[w-1];
  const pool=WAVE_CFG[w-1];
  for(let i=0;i<count;i++){
    const ti=pool[Math.floor(Math.random()*pool.length)];
    const e=createEnemy(ti);
    const ang=(i/count)*Math.PI*2+Math.random()*0.5;
    const dist=25+Math.random()*18;
    e.position.set(Math.cos(ang)*dist,0,Math.sin(ang)*dist);
    scene.add(e); enemies.push(e);
    drawHPBar(e);
  }
  document.getElementById('waveText').textContent=`웨이브 ${w}/${MAX_WAVES}`;
  showSkillMsg(`웨이브 ${w} 시작! 적 ${count}명`);
}

// ══════════════════════════════════════════════
const PART_CFG={
  explosion:{count:22,colors:[0xff6600,0xff3300,0xffaa00,0xffff00],speed:8,life:0.65,size:0.14},
  hit:      {count:6, colors:[0xffffff,0xffff88],                   speed:4,life:0.28,size:0.07},
  heal:     {count:9, colors:[0x00ff88,0x88ffcc,0xffffff],           speed:2,life:0.5, size:0.08},
  muzzle:   {count:4, colors:[0xffff44,0xff9900],                    speed:3,life:0.1, size:0.06},
  death:    {count:20,colors:[0xff2200,0xff6600,0x880000],           speed:6,life:0.8, size:0.13},
};

function spawnFX(pos,type){
  const cfg=PART_CFG[type]||PART_CFG.hit;
  for(let i=0;i<cfg.count;i++){
    const color=cfg.colors[i%cfg.colors.length];
    const m=new THREE.Mesh(
      new THREE.SphereGeometry(cfg.size*(0.5+Math.random()*0.5),4,4),
      new THREE.MeshBasicMaterial({color,transparent:true})
    );
    m.position.copy(pos);
    scene.add(m);
    const vel=new THREE.Vector3((Math.random()-0.5)*2,Math.random()*2-0.3,(Math.random()-0.5)*2)
      .normalize().multiplyScalar(cfg.speed*(0.4+Math.random()*0.6));
    particles.push({m,vel,life:cfg.life*(0.6+Math.random()*0.8),maxLife:cfg.life,grav:type==='heal'?-0.5:7});
  }
  if(type==='explosion'||type==='death'){
    const pl=new THREE.PointLight(0xff5500,3.5,9);
    pl.position.copy(pos); scene.add(pl);
    impactLights.push({l:pl,t:0.5});
  }
  playHitSound(type);
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){scene.remove(p.m);particles.splice(i,1);continue;}
    p.vel.y-=p.grav*dt;
    p.m.position.addScaledVector(p.vel,dt);
    const t=p.life/p.maxLife;
    p.m.material.opacity=t; p.m.scale.setScalar(t*0.7+0.3);
  }
  for(let i=impactLights.length-1;i>=0;i--){
    const il=impactLights[i]; il.t-=dt;
    il.l.intensity=Math.max(0,(il.t/0.5)*3.5);
    if(il.t<=0){scene.remove(il.l);impactLights.splice(i,1);}
  }
}

// BULLETS
// ══════════════════════════════════════════════
function fireBullet(fromPos,dir,damage,isPlayer){
  if(isPlayer) totalShots++;
  const geo=new THREE.CylinderGeometry(0.024,0.024,0.38,5);
  const mat=new THREE.MeshBasicMaterial({color:isPlayer?0xffff44:0xff3333});
  const m=new THREE.Mesh(geo,mat);
  m.position.copy(fromPos);
  const q=new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
  m.quaternion.copy(q);
  scene.add(m);
  // Glow trail
  const trail=new THREE.Mesh(
    new THREE.CylinderGeometry(0.01,0.01,0.55,4),
    new THREE.MeshBasicMaterial({color:isPlayer?0xffffaa:0xff8888,transparent:true,opacity:0.35})
  );
  trail.position.y=0.3; m.add(trail);
  bullets.push({m,vel:dir.clone().normalize().multiplyScalar(42),dmg:damage,isPlayer,life:2.8});
}

function updateBullets(dt){
  const pp=camera.position;
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i]; b.life-=dt;
    if(b.life<=0){scene.remove(b.m);bullets.splice(i,1);continue;}
    b.m.position.addScaledVector(b.vel,dt);
    if(b.isPlayer){
      let hit=false;
      for(let j=enemies.length-1;j>=0;j--){
        const e=enemies[j];
        if(!e.userData.alive) continue;
        const ep=e.position.clone(); ep.y+=1.0;
        if(b.m.position.distanceTo(ep)<0.92){
          hit=true; totalHits++;
          damageEnemy(e,b.dmg,b.vel.clone().normalize());
          spawnFX(b.m.position.clone(),'hit');
          break;
        }
      }
      if(hit){scene.remove(b.m);bullets.splice(i,1);continue;}
      // Deflect
      if(deflectActive){
        // already handled via rebound
      }
    } else {
      if(b.m.position.distanceTo(pp)<0.75){
        if(deflectActive){
          b.isPlayer=true;
          b.vel.negate();
        } else {
          takeDmg(b.dmg);
          spawnFX(b.m.position.clone(),'hit');
          scene.remove(b.m); bullets.splice(i,1); continue;
        }
      }
    }
    if(b.m.position.y<0.05){
      addDecal(b.m.position.clone());
      scene.remove(b.m); bullets.splice(i,1);
    }
  }
}

function addDecal(pos){
  if(decals.length>60){scene.remove(decals[0].m);decals.shift();}
  const d=new THREE.Mesh(
    new THREE.CircleGeometry(0.13,6),
    new THREE.MeshBasicMaterial({color:0x111100,transparent:true,opacity:0.65,depthWrite:false})
  );
  d.rotation.x=-Math.PI/2; d.position.copy(pos); d.position.y=0.012;
  scene.add(d); decals.push({m:d});
}

// ══════════════════════════════════════════════
// COMBAT
// ══════════════════════════════════════════════
function damageEnemy(e,dmg,bulletDir){
  const ud=e.userData; if(!ud.alive) return;
  ud.hp-=dmg; drawHPBar(e);
  ud.staggerTimer=0.12;
  ultCharge=Math.min(100,ultCharge+dmg*0.14);
  enemyHitReaction(e, bulletDir||camera.getWorldDirection(new THREE.Vector3()));
  if(ud.hp<=0) killEnemy(e);
}

function killEnemy(e){
  const ud=e.userData; if(!ud.alive) return;
  ud.alive=false; ud.state='dead'; ud.deathTimer=1.2;
  score+=ud.score; totalKills++;
  addKillFeed(`${localStorage.getItem(TimeGuard.KEY_NICK)||'플레이어'}가 ${ud.typeName} 처치!`);
  playKillSound();
  spawnFX(e.position.clone().setY(1.2),'death');
  if(currentHero.id==='reaper') player.hp=Math.min(player.maxHp,player.hp+30);
  updateHUD();
  document.getElementById('killText').textContent=`처치: ${totalKills}`;
  document.getElementById('scoreText').textContent=`점수: ${score}`;
}

function takeDmg(dmg){
  if(ghostActive) return;
  let r=dmg;
  if(shieldHP>0){const a=Math.min(shieldHP,r);shieldHP-=a;r-=a;}
  if(r>0) player.hp=Math.max(0,player.hp-r);
  screenShake=6;
  playDamageSound();
  const ov=document.getElementById('dmgOverlay');
  ov.style.borderColor='rgba(255,0,0,0.55)';
  setTimeout(()=>ov.style.borderColor='transparent',150);
  if(player.hp<=0) gameOver();
  updateHUD();
}

// AI STATE MACHINE
// ══════════════════════════════════════════════
function updateEnemies(dt,now){
  const pp=camera.position.clone();
  enemies.forEach(e=>{
    const ud=e.userData;
    if(!ud.alive){
      if(ud.deathTimer>0){
        ud.deathTimer-=dt;
        const t=ud.deathTimer/1.2;
        // 뒤로 넘어지면서 회전
        e.rotation.x=(1-t)*(-Math.PI/3);
        e.rotation.z=(1-t)*(Math.PI/6)*Math.sin((1-t)*8);
        e.position.y=Math.max(-0.3,(1-t)*(-0.5));
        // 페이드아웃 + 붉은 발광
        e.traverse(c=>{
          if(c.material&&c.material!==hitFlashMat){
            c.material.opacity=Math.max(0,t);
            c.material.transparent=true;
          }
        });
        if(ud.deathTimer<=0){scene.remove(e);const idx=enemies.indexOf(e);if(idx>-1)enemies.splice(idx,1);}
      }
      return;
    }
    updateHitEffects(e,dt);
    if(ud.staggerTimer>0){ud.staggerTimer-=dt;return;}

    const dist=e.position.distanceTo(pp);
    const hpPct=ud.hp/ud.maxHp;

    // Medic logic
    if(ud.healer){
      let target=null,minH=Infinity;
      enemies.forEach(e2=>{
        if(e2!==e&&e2.userData.alive&&e2.userData.hp<e2.userData.maxHp){
          const d2=e.position.distanceTo(e2.position);
          if(d2<16&&e2.userData.hp<minH){minH=e2.userData.hp;target=e2;}
        }
      });
      if(target){
        moveToward(e,target.position,ud.speed,dt);
        if(e.position.distanceTo(target.position)<2.8){
          target.userData.hp=Math.min(target.userData.maxHp,target.userData.hp+45*dt);
          drawHPBar(target);
        }
        animWalk(e,ud,dt); return;
      }
    }

    // State transitions
    if(hpPct<0.28&&ud.state!=='cover'&&ud.state!=='dead'){
      ud.state='cover'; ud.coverTimer=3.5;
      ud.coverTarget=e.position.clone().sub(pp).normalize().multiplyScalar(12).add(e.position);
      ud.coverTarget.y=0;
    } else if(dist<ud.range&&ud.state!=='cover'){
      ud.state='attack';
    } else if(dist<40&&ud.state!=='cover'){
      ud.state='chase';
    } else if(ud.state==='attack'||ud.state==='chase'){
      ud.patrolTimer-=dt;
      if(ud.patrolTimer<=0){
        ud.state='patrol';
        ud.patrolTarget.set((Math.random()-0.5)*40,0,(Math.random()-0.5)*40);
        ud.patrolTimer=2+Math.random()*3;
      }
    } else if(ud.state==='patrol'){
      ud.patrolTimer-=dt;
      if(ud.patrolTimer<=0||e.position.distanceTo(ud.patrolTarget)<2){
        ud.patrolTarget.set((Math.random()-0.5)*40,0,(Math.random()-0.5)*40);
        ud.patrolTimer=2+Math.random()*3;
      }
    }

    switch(ud.state){
      case 'patrol':
        moveToward(e,ud.patrolTarget,ud.speed*0.5,dt);
        animWalk(e,ud,dt); break;
      case 'chase':
        moveToward(e,pp,ud.speed,dt);
        animWalk(e,ud,dt); break;
      case 'attack':
        e.lookAt(pp.x,e.position.y,pp.z);
        // Strafe
        const s=new THREE.Vector3(pp.z-e.position.z,0,-(pp.x-e.position.x)).normalize();
        e.position.addScaledVector(s,Math.sin(now*0.002)*ud.speed*0.25*dt);
        if(now-ud.lastFire>ud.fireRate){
          ud.lastFire=now;
          const d=pp.clone().sub(e.position.clone().setY(1.5)).normalize();
          d.x+=(Math.random()-0.5)*0.14; d.y+=(Math.random()-0.5)*0.07;
          fireBullet(e.position.clone().setY(1.45),d.normalize(),ud.dmg,false);
        }
        break;
      case 'cover':
        ud.coverTimer-=dt;
        if(ud.coverTimer<=0){ud.state='patrol';ud.patrolTimer=2;}
        else if(ud.coverTarget) moveToward(e,ud.coverTarget,ud.speed*1.3,dt);
        animWalk(e,ud,dt); break;
    }

    e.position.y=0;
    ud.hpBar.lookAt(camera.position);
  });
}

function animWalk(e,ud,dt){
  ud.walkPhase+=dt*5.5;
  if(ud.lLeg) ud.lLeg.rotation.x=Math.sin(ud.walkPhase)*0.42;
  if(ud.rLeg) ud.rLeg.rotation.x=-Math.sin(ud.walkPhase)*0.42;
  if(ud.lArm) ud.lArm.rotation.x=-Math.sin(ud.walkPhase)*0.3;
  if(ud.rArm) ud.rArm.rotation.x=Math.sin(ud.walkPhase)*0.3;
}

function moveToward(obj,target,spd,dt){
  const d=target.clone().sub(obj.position); d.y=0;
  if(d.length()<0.12) return;
  obj.position.addScaledVector(d.normalize(),spd*dt);
  obj.lookAt(target.x,obj.position.y,target.z);
}

// ══════════════════════════════════════════════
// SKILLS
// ══════════════════════════════════════════════
function useSkill(key){
  const sk=currentHero.skills.find(s=>s.key===key); if(!sk) return;
  if(skillCooldowns[key]>0) return;
  skillCooldowns[key]=sk.cooldown>0?sk.cooldown:3;
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);

  switch(currentHero.id){
    case 'soldier':
      if(key==='Q'){ camera.position.addScaledVector(dir,8); showSkillMsg('전술 질풍!'); }
      else if(key==='E'){ throwGrenade(camera.position.clone(),dir.clone()); showSkillMsg('수류탄!'); }
      else if(key==='Shift'){ healRegen=true; healRegenTimer=5; showSkillMsg('생체장 활성화!'); }
      break;
    case 'tank':
      if(key==='Q'){
        enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(camera.position)<6)damageEnemy(e,120);});
        spawnFX(camera.position.clone().addScaledVector(dir,3.5),'explosion'); showSkillMsg('화염 강타!');
      } else if(key==='E'){
        enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(camera.position)<9){damageEnemy(e,90);e.userData.staggerTimer=1.8;}});
        screenShake=10; spawnFX(camera.position.clone(),'explosion'); showSkillMsg('대격변!');
      } else if(key==='Shift'){ shieldHP=500; shieldTimer=10; showSkillMsg('방어막 활성화!'); }
      break;
    case 'mercy':
      if(key==='Q'){ player.hp=Math.min(player.maxHp,player.hp+80); spawnFX(camera.position.clone(),'heal'); showSkillMsg('치유 광선!'); }
      else if(key==='E'){ player.hp=player.maxHp; spawnFX(camera.position.clone(),'heal'); showSkillMsg('부활!'); }
      else if(key==='Shift'){ camera.position.addScaledVector(dir,10); showSkillMsg('수호천사!'); }
      break;
    case 'genji':
      if(key==='Q'){
        for(let a=-15;a<=15;a+=15){
          const d2=dir.clone().applyAxisAngle(new THREE.Vector3(0,1,0),a*Math.PI/180);
          fireBullet(camera.position.clone().setY(1.5),d2,40,true);
        }
        showSkillMsg('수리검!');
      } else if(key==='E'){ deflectActive=true; deflectTimer=2; showSkillMsg('편향 활성!'); }
      else if(key==='Shift'){
        camera.position.addScaledVector(dir,7);
        enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(camera.position)<2.8)damageEnemy(e,60);});
        showSkillMsg('질풍참!');
      }
      break;
    case 'reaper':
      if(key==='Q'){
        const t=camera.position.clone().addScaledVector(dir,14); t.y=1.7;
        spawnFX(camera.position.clone(),'hit'); camera.position.copy(t); spawnFX(t.clone(),'hit'); showSkillMsg('텔레포트!');
      } else if(key==='E'){ ghostActive=true; ghostTimer=3; healRegen=true; healRegenTimer=3; showSkillMsg('망령화!'); }
      else if(key==='Shift'){ skillCooldowns[key]=0; showSkillMsg('영혼 수확(패시브)'); }
      break;
  }
  playSkillSound();
  updateHUD();
}

function useUltimate(){
  if(ultCharge<100) return;
  ultCharge=0; playUltSound(); showSkillMsg(`★ ${currentHero.ultimate.name}! ★`);
  switch(currentHero.id){
    case 'soldier': ultActive=true; ultTimer=5; break;
    case 'tank':
      enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(camera.position)<22){damageEnemy(e,220);e.userData.staggerTimer=2.5;}});
      screenShake=16; spawnFX(camera.position.clone(),'explosion'); break;
    case 'mercy': valkyrieActive=true; valkyrieTimer=10; break;
    case 'genji': dragonbladeActive=true; dragonbladeTimer=8; break;
    case 'reaper':
      for(let a=0;a<360;a+=30){
        const d=new THREE.Vector3(Math.cos(a*Math.PI/180),0,Math.sin(a*Math.PI/180));
        fireBullet(camera.position.clone().setY(1.5),d,65,true);
      }
      spawnFX(camera.position.clone(),'explosion'); break;
  }
  updateHUD();
}

function throwGrenade(pos,dir){
  const m=new THREE.Mesh(new THREE.SphereGeometry(0.13,6,5),new THREE.MeshLambertMaterial({color:0x333300}));
  m.position.copy(pos).setY(1.6); scene.add(m);
  const vel=dir.clone().multiplyScalar(14).setY(8);
  const grav=new THREE.Vector3(0,-9.8,0);
  let t=0;
  const iv=setInterval(()=>{
    t+=0.016; vel.addScaledVector(grav,0.016);
    m.position.addScaledVector(vel,0.016);
    if(t>2.5||m.position.y<0.1){
      clearInterval(iv); scene.remove(m);
      spawnFX(m.position.clone(),'explosion');
      enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(m.position)<6)damageEnemy(e,90);});
    }
  },16);
}

// ══════════════════════════════════════════════
// PLAYER UPDATE
// ══════════════════════════════════════════════
function updatePlayer(dt,now){
  if(gameState!=='playing') return;

  // Mouse look
  player.yaw-=mouseDX*0.0018;
  player.pitch-=mouseDY*0.0018;
  player.pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,player.pitch));
  mouseDX=0; mouseDY=0;
  camera.rotation.order='YXZ';
  camera.rotation.y=player.yaw;
  camera.rotation.x=player.pitch;

  // Movement
  const spd=currentHero.speed*(valkyrieActive?1.45:1);
  const fw=new THREE.Vector3(-Math.sin(player.yaw),0,-Math.cos(player.yaw));
  const rt=new THREE.Vector3(Math.cos(player.yaw),0,-Math.sin(player.yaw));
  const mv=new THREE.Vector3();
  if(keys['KeyW']||keys['ArrowUp']) mv.addScaledVector(fw,-1);
  if(keys['KeyS']||keys['ArrowDown']) mv.addScaledVector(fw,1);
  if(keys['KeyA']||keys['ArrowLeft']) mv.addScaledVector(rt,-1);
  if(keys['KeyD']||keys['ArrowRight']) mv.addScaledVector(rt,1);
  const isMoving=mv.lengthSq()>0.001;
  if(isMoving) mv.normalize().multiplyScalar(spd*dt);
  camera.position.add(mv);
  camera.position.y=1.7;
  camera.position.x=Math.max(-95,Math.min(95,camera.position.x));
  camera.position.z=Math.max(-95,Math.min(95,camera.position.z));

  // Weapon bob
  if(isMoving){
    bobTime+=dt*8;
    if(weaponGroup){ weaponGroup.position.y=-0.25+Math.sin(bobTime)*0.013; weaponGroup.position.x=0.22+Math.cos(bobTime*0.5)*0.006; }
  } else {
    if(weaponGroup){ weaponGroup.position.y+=(- 0.25-weaponGroup.position.y)*dt*9; weaponGroup.position.x+=(0.22-weaponGroup.position.x)*dt*9; }
  }

  // Recoil
  if(weaponGroup){ recoilY+=(0-recoilY)*dt*14; weaponGroup.rotation.x=recoilY; }

  // Screen shake
  if(screenShake>0){ screenShake--; camera.position.x+=(Math.random()-0.5)*0.035; camera.position.y=1.7+(Math.random()-0.5)*0.025; }

  // Timers
  Object.keys(skillCooldowns).forEach(k=>{ if(skillCooldowns[k]>0) skillCooldowns[k]=Math.max(0,skillCooldowns[k]-dt); });
  if(deflectActive){ deflectTimer-=dt; if(deflectTimer<=0) deflectActive=false; }
  if(ghostActive){ ghostTimer-=dt; document.getElementById('ghostIndicator').style.opacity=ghostActive?'1':'0'; if(ghostTimer<=0){ghostActive=false;document.getElementById('ghostIndicator').style.opacity='0';} }
  if(valkyrieActive){ valkyrieTimer-=dt; if(valkyrieTimer<=0) valkyrieActive=false; }
  if(dragonbladeActive){ dragonbladeTimer-=dt;
    enemies.forEach(e=>{if(e.userData.alive&&e.position.distanceTo(camera.position)<3.2)damageEnemy(e,220*dt);});
    if(dragonbladeTimer<=0) dragonbladeActive=false;
  }
  if(shieldTimer>0){ shieldTimer-=dt; if(shieldTimer<=0) shieldHP=0; }
  if(healRegen){ healRegenTimer-=dt; player.hp=Math.min(player.maxHp,player.hp+28*dt); if(healRegenTimer<=0) healRegen=false; }
  if(isReloading){
    reloadTimer-=dt;
    document.getElementById('reloadFill').style.width=((1-reloadTimer/reloadDuration)*100)+'%';
    if(reloadTimer<=0){ isReloading=false; currentClip=currentHero.clipSize; document.getElementById('reloadBar').style.display='none'; showSkillMsg('재장전 완료'); }
  }

  // Ult effects
  if(ultActive){ ultTimer-=dt;
    if(currentHero.id==='soldier'){
      let nearest=null,minD=999;
      enemies.forEach(e=>{ if(e.userData.alive){const d=e.position.distanceTo(camera.position);if(d<minD){minD=d;nearest=e;}} });
      if(nearest&&now%120<16){
        const ad=nearest.position.clone().setY(1.2).sub(camera.position).normalize();
        fireBullet(camera.position.clone().addScaledVector(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion),0.5),ad,currentHero.damage*1.6,true);
      }
    }
    if(ultTimer<=0) ultActive=false;
  }
}

// ══════════════════════════════════════════════
// SHOOTING
// ══════════════════════════════════════════════
function tryShoot(now){
  if(!pointerLocked||gameState!=='playing') return;
  if(isReloading) return;
  const elapsed=now-lastFireTime;
  const fr=valkyrieActive?currentHero.fireRate*0.6:currentHero.fireRate;
  if(elapsed<fr) return;
  lastFireTime=now;
  if(currentClip<=0){ startReload(); return; }
  currentClip--;
  const dir=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  if(currentHero.id==='reaper'){
    for(let i=0;i<7;i++){
      const sd=dir.clone();
      sd.x+=(Math.random()-0.5)*0.18; sd.y+=(Math.random()-0.5)*0.1; sd.z+=(Math.random()-0.5)*0.18;
      fireBullet(camera.position.clone().addScaledVector(dir,0.55),sd.normalize(),currentHero.damage,true);
    }
  } else {
    fireBullet(camera.position.clone().addScaledVector(dir,0.55),dir,currentHero.damage*(valkyrieActive?1.55:1),true);
  }
  recoilY+=0.065;
  if(weaponGroup) weaponGroup.position.z+=-0.04;
  setTimeout(()=>{ if(weaponGroup) weaponGroup.position.z+= 0.04; },60);
  if(currentHero.id==='reaper') playShotgunSound();
  else if(currentHero.id==='tank') playHammerSound();
  else playShootSound();
  updateHUD();
}

function startReload(){
  if(isReloading||currentClip===currentHero.clipSize) return;
  isReloading=true; reloadTimer=reloadDuration;
  document.getElementById('reloadBar').style.display='block';
  document.getElementById('reloadFill').style.width='0%';
  playReloadSound();
  showSkillMsg('재장전 중...');
}

// ══════════════════════════════════════════════
// INPUT
// ══════════════════════════════════════════════
function setupInput(){
  document.addEventListener('keydown',e=>{
    if(e.repeat) return;
    keys[e.code]=true;
    if(gameState!=='playing') return;
    if(e.code==='KeyQ') useSkill('Q');
    else if(e.code==='KeyE') useSkill('E');
    else if(e.code==='ShiftLeft'||e.code==='ShiftRight') useSkill('Shift');
    else if(e.code==='KeyR') startReload();
    else if(e.code==='KeyF') useUltimate();
    else if(e.code==='Escape') togglePause();
  });
  document.addEventListener('keyup',e=>{ keys[e.code]=false; });
  document.addEventListener('mousemove',e=>{ if(pointerLocked){mouseDX+=e.movementX;mouseDY+=e.movementY;} });
  document.addEventListener('mousedown',e=>{ if(e.button===0) mouseHeld=true; });
  document.addEventListener('mouseup',e=>{ if(e.button===0) mouseHeld=false; });
}

function setupPointerLock(){
  const cv=document.getElementById('c');
  cv.addEventListener('click',()=>{
    if(gameState==='playing') cv.requestPointerLock();
    else if(gameState==='paused'){
      gameState='playing';
      document.getElementById('pauseOverlay').style.display='none';
      cv.requestPointerLock();
    }
  });
  document.addEventListener('pointerlockchange',()=>{
    pointerLocked=document.pointerLockElement===cv;
    document.getElementById('clickPrompt').style.display=(!pointerLocked&&(gameState==='playing'||gameState==='paused'))?'block':'none';
    if(!pointerLocked&&gameState==='playing'){
      gameState='paused';
      document.getElementById('pauseOverlay').style.display='flex';
    }
  });
}

function togglePause(){
  if(gameState==='playing') document.exitPointerLock();
}

// ══════════════════════════════════════════════
// HUD
// ══════════════════════════════════════════════
function updateHUD(){
  const hpP=(player.hp/player.maxHp)*100;
  document.getElementById('hpBarInner').style.width=hpP+'%';
  const shP=shieldHP>0?(shieldHP/maxShield)*100:0;
  document.getElementById('shieldBarInner').style.width=shP+'%';
  document.getElementById('hpNum').textContent=`${Math.ceil(player.hp)} / ${player.maxHp}`;
  document.getElementById('ammo').textContent=isReloading?'재장전...':`${currentClip} / ${currentHero.clipSize}`;
  document.getElementById('ultFill').style.width=ultCharge+'%';
  currentHero.skills.forEach(s=>{
    const cd=document.getElementById('scd_'+s.key); if(!cd) return;
    const rem=skillCooldowns[s.key]||0;
    if(rem>0.05){ cd.classList.remove('hidden'); cd.textContent=rem.toFixed(1); }
    else cd.classList.add('hidden');
  });
}

// ══════════════════════════════════════════════
// KILL FEED
// ══════════════════════════════════════════════
function addKillFeed(text){
  if(killFeedItems.length>=5){
    const old=killFeedItems.shift();
    if(old.el?.parentNode) old.el.parentNode.removeChild(old.el);
  }
  const el=document.createElement('div'); el.className='killEntry'; el.textContent=text;
  document.getElementById('killFeedWrap').appendChild(el);
  killFeedItems.push({el,t:4});
}

function updateKillFeed(dt){
  for(let i=killFeedItems.length-1;i>=0;i--){
    const k=killFeedItems[i]; k.t-=dt;
    if(k.t<1) k.el.style.opacity=Math.max(0,k.t);
    if(k.t<=0){if(k.el?.parentNode)k.el.parentNode.removeChild(k.el);killFeedItems.splice(i,1);}
  }
}

// ══════════════════════════════════════════════
// MINIMAP
// ══════════════════════════════════════════════
function updateMinimap(){
  const mc=document.getElementById('mmCanvas');
  const ctx=mc.getContext('2d');
  const W=mc.width,R=W/2;
  ctx.clearRect(0,0,W,W);
  ctx.fillStyle='rgba(0,0,0,0.68)';
  ctx.beginPath();ctx.arc(R,R,R,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(R,R,R-1,0,Math.PI*2);ctx.stroke();
  const scale=W/200;
  const px=camera.position.x,pz=camera.position.z;
  enemies.forEach(e=>{
    if(!e.userData.alive) return;
    const ex=(e.position.x-px)*scale+R, ez=(e.position.z-pz)*scale+R;
    if(ex<4||ex>W-4||ez<4||ez>W-4) return;
    const c=new THREE.Color(ENEMY_TYPES[e.userData.type].color);
    ctx.fillStyle=`rgb(${Math.floor(c.r*255)},${Math.floor(c.g*255)},${Math.floor(c.b*255)})`;
    ctx.beginPath();ctx.arc(ex,ez,3.5,0,Math.PI*2);ctx.fill();
  });
  // Player arrow
  ctx.fillStyle='#00aaff';
  ctx.save(); ctx.translate(R,R); ctx.rotate(-player.yaw);
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(-4,5); ctx.lineTo(4,5); ctx.closePath(); ctx.fill();
  ctx.restore();
  // Compass
  ctx.fillStyle='rgba(255,255,255,0.4)'; ctx.font='8px Arial';
  ctx.fillText('N',R-3,10); ctx.fillText('S',R-3,W-2);
}

// ══════════════════════════════════════════════
// WAVE CHECK
// ══════════════════════════════════════════════
function checkWave(){
  if(!waveActive) return;
  if(enemies.filter(e=>e.userData.alive).length===0){
    waveActive=false;
    if(waveNum>=MAX_WAVES) victory();
    else { waveTimer=4; showSkillMsg(`웨이브 ${waveNum} 클리어! 다음 웨이브까지 ${waveTimer}초`); }
  }
}

// ══════════════════════════════════════════════
// GAME OVER / VICTORY
// ══════════════════════════════════════════════
function gameOver(){
  if(gameState==='over') return;
  gameState='over'; window.gameRunning=false; TimeGuard.stopSession();
  document.exitPointerLock();
  const acc=totalShots>0?Math.round(totalHits/totalShots*100):0;
  document.getElementById('resultTitle').textContent='게임 오버';
  document.getElementById('resultTitle').className='lose';
  document.getElementById('resultStats').innerHTML=
    `웨이브: ${waveNum}/${MAX_WAVES} &nbsp;|&nbsp; 처치: ${totalKills} &nbsp;|&nbsp; 점수: ${score}<br>정확도: ${acc}% &nbsp;|&nbsp; 총 발사: ${totalShots}발`;
  document.getElementById('resultOverlay').style.display='flex';
}

function victory(){
  if(gameState==='victory') return;
  gameState='victory'; window.gameRunning=false; TimeGuard.stopSession();
  document.exitPointerLock();
  const acc=totalShots>0?Math.round(totalHits/totalShots*100):0;
  document.getElementById('resultTitle').textContent='승리!';
  document.getElementById('resultTitle').className='win';
  document.getElementById('resultStats').innerHTML=
    `모든 웨이브 클리어! &nbsp;|&nbsp; 처치: ${totalKills} &nbsp;|&nbsp; 점수: ${score}<br>정확도: ${acc}% &nbsp;|&nbsp; 히어로: ${currentHero.name}`;
  document.getElementById('resultOverlay').style.display='flex';
}

function onResize(){
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
let masterGain=null;
function initAudio(){
  if(audioInited) return; audioInited=true;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    masterGain=audioCtx.createGain();
    masterGain.gain.value=0.5;
    masterGain.connect(audioCtx.destination);
    startBGM();
  }catch(e){ console.warn('Audio init failed:',e); }
}

function startBGM(){
  if(!audioCtx||!masterGain) return;
  // 저음 드론 BGM
  const drone=audioCtx.createOscillator();
  const dG=audioCtx.createGain();
  drone.type='sawtooth'; drone.frequency.value=55;
  dG.gain.value=0.04;
  drone.connect(dG); dG.connect(masterGain); drone.start();
  // 간헐적 텐션 사운드
  setInterval(()=>{
    if(!window.gameRunning||gameState!=='playing'||!audioCtx) return;
    if(Math.random()<0.35){
      const o=audioCtx.createOscillator();
      const g=audioCtx.createGain();
      o.type='square'; o.frequency.value=65+Math.random()*55;
      g.gain.setValueAtTime(0,audioCtx.currentTime);
      g.gain.linearRampToValueAtTime(0.06,audioCtx.currentTime+0.08);
      g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
      o.connect(g); g.connect(masterGain);
      o.start(); o.stop(audioCtx.currentTime+0.6);
    }
  },2000);
}

function playShootSound(){
  if(!audioCtx||!masterGain) return;
  try{
    const t=audioCtx.currentTime;
    // 총격 노이즈 (버퍼)
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.08,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.8;
    const noise=audioCtx.createBufferSource();
    noise.buffer=buf;
    const nG=audioCtx.createGain();
    nG.gain.setValueAtTime(0.35,t);
    nG.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    noise.connect(nG); nG.connect(masterGain);
    noise.start(t); noise.stop(t+0.08);
    // 톤
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='square'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+0.06);
    g.gain.setValueAtTime(0.2,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+0.07);
  }catch(e){}
}

function playShotgunSound(){
  if(!audioCtx||!masterGain) return;
  try{
    const t=audioCtx.currentTime;
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const noise=audioCtx.createBufferSource();
    noise.buffer=buf;
    const nG=audioCtx.createGain();
    nG.gain.setValueAtTime(0.5,t);
    nG.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    noise.connect(nG); nG.connect(masterGain);
    noise.start(t); noise.stop(t+0.15);
    const o=audioCtx.createOscillator();
    const g=audioCtx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(100,t); o.frequency.exponentialRampToValueAtTime(30,t+0.1);
    g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g); g.connect(masterGain);
    o.start(t); o.stop(t+0.12);
  }catch(e){}
}

function playHitSound(type){
  if(!audioCtx||!masterGain) return;
  try{
    const t=audioCtx.currentTime;
    if(type==='explosion'||type==='death'){
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.3,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.max(0,1-i/d.length);
      const n=audioCtx.createBufferSource(); n.buffer=buf;
      const g=audioCtx.createGain();
      g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      n.connect(g); g.connect(masterGain); n.start(t); n.stop(t+0.3);
      const o=audioCtx.createOscillator(); const og=audioCtx.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(80,t); o.frequency.exponentialRampToValueAtTime(20,t+0.3);
      og.gain.setValueAtTime(0.3,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.connect(og); og.connect(masterGain); o.start(t); o.stop(t+0.35);
    } else if(type==='heal'){
      const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
      o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.linearRampToValueAtTime(880,t+0.2);
      g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.3);
      o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.3);
    } else {
      const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=800;
      g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
      o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.07);
    }
  }catch(e){}
}

  if(!audioCtx||!masterGain) return;

}

function playReloadSound(){
  if(!audioCtx||!masterGain) return;

    const t=audioCtx.currentTime;
    [0,0.15,0.4].forEach((off,i)=>{
      const o=audioCtx.createOscillator(); const g=audioCtx.createGain();
      o.type='sine'; o.frequency.value=[600,400,800][i];
      g.gain.setValueAtTime(0.12,t+off); g.gain.exponentialRampToValueAtTime(0.001,t+off+0.08);
      o.connect(g); g.connect(masterGain); o.start(t+off); o.stop(t+off+0.1);
    });

}

document.addEventListener('click',initAudio,{once:false});

// 선생님 초기화 (⑤ 5회 클릭)
let _teacherClicks=0,_teacherTimer=0;
function teacherReset(el){
  clearTimeout(_teacherTimer);
  _teacherClicks++;
  el.textContent='⑤'.repeat(5-_teacherClicks+1)||'⑤';
  if(_teacherClicks>=5){
    localStorage.removeItem('hn_playtime');
    localStorage.removeItem('hn_date');
    _teacherClicks=0;
    alert('초기화 완료! 다시 시작합니다.');
    location.reload();
  } else {
    _teacherTimer=setTimeout(()=>{_teacherClicks=0;el.textContent='⑤';},2000);
  }
}

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
function gameLoop(){
  requestAnimationFrame(gameLoop);
  if(!window.gameRunning) return;
  const dt=Math.min(clock.getDelta(),0.05);
  const now=performance.now();

  if(gameState==='playing'){
    if(mouseHeld) tryShoot(now);
    updatePlayer(dt,now);
    updateEnemies(dt,now);
    updateBullets(dt);
    updateParticles(dt);
    updateKillFeed(dt);
    updateMinimap();
    updateHUD();
    checkWave();

    // Skill msg fade
    if(skillMsgTimer>0){
      skillMsgTimer-=dt;
      if(skillMsgTimer<0.6) document.getElementById('skillMsg').style.opacity=Math.max(0,skillMsgTimer/0.6);
    }
    // Wave delay
    if(!waveActive&&waveTimer>0){
      waveTimer-=dt;
      if(waveTimer<=0) spawnWave(waveNum+1);
    }
  }
  renderer.render(scene,camera);
}
